meters:
- name: user_seats
  description: Licensed Tradify user seats, billed per user per month. Primary cost driver.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: payment_processing
  description: Card payment processing fees when Stripe is enabled for customer payments (charged by Stripe).
  unit: transactions
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track licensed seats per plan and per account; there is no API usage to meter.
- name: Allocation
  description: Map user seats to teams/branches so the monthly per-seat cost lands on the right cost center.
- name: Optimization
  description: Right-size seats - deactivate users who no longer need access, and match each user to the lowest plan tier that meets their needs.
- name: Accountability
  description: Review active seat count monthly against the subscription invoice; watch for orphaned or duplicate seats.
