description: >-
  FinOps view of Tradify spend. Tradify is a per-user SaaS subscription (job
  management for trades and services), not a metered/usage-based API product -
  there is no public API to meter or optimize. Cost is driven almost entirely by
  the number of active user seats multiplied by the plan rate (Lite / Pro / Plus,
  or a Custom agreement), billed monthly. Optimization is therefore about seat
  management (right-sizing licensed users, deactivating unused seats) rather than
  request/token metering. Connected accounting/payment partners (Xero, MYOB,
  QuickBooks Online, Sage, Stripe) may carry their own separate charges.
notes: >-
  Per-user rates are not reconciled here; verify on Tradify's pricing page.
  Because pricing is per seat, the primary FinOps lever is seat count, not API
  usage. Stripe payment processing (if enabled for taking customer payments)
  incurs Stripe's own transaction fees.
