aid: tradify
url: https://raw.githubusercontent.com/api-evangelist/tradify/refs/heads/main/apis.yml
name: Tradify
kind: company
description: >-
  Tradify is all-in-one job management software for trade and service businesses
  (electricians, plumbers, HVAC, builders and other contractors), covering
  enquiries, quotes, jobs, scheduling and dispatch, timesheets, purchase orders,
  and invoicing from web and mobile apps. Tradify is an Access company. IMPORTANT
  ACCESS NOTE - as of this review Tradify does NOT publish an open, self-serve,
  documented public developer API, developer portal, API keys, or webhooks. Its
  supported programmatic surface is limited to pre-built accounting and payment
  partner integrations (Xero, MYOB Business, QuickBooks Online, Sage, and Stripe).
  A live application backend host (api.tradifyhq.com) exists but is undocumented,
  session-authenticated, and reserved for Tradify's own web and mobile clients;
  third parties reach Tradify data only through those partner integrations or
  through unofficial proxies that automate the authenticated session. The API
  entries below are MODELED from Tradify's product capabilities and are not
  confirmed against official public API documentation.
